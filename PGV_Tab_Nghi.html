<div class="card shadow-sm p-0 border-0">
  
  <div class="card-header bg-white border-bottom-0 pt-3 pb-3">
    <div class="d-flex align-items-center">
      <div class="fw-bold text-danger me-4 text-uppercase fs-6">
        <i class="bi bi-calendar-x"></i> TỔNG HỢP NGHỈ
      </div>
      
      <div class="d-flex align-items-center">
         <span class="fw-bold me-2 text-dark" style="font-size: 18px;">Năm học:</span>
         
         <div style="width: 180px;">
            <select id="filterYearLeave" class="form-select form-select-sm shadow-none border-danger" onchange="renderLeaveSummaryTable()">
               <option value="">--Chọn năm--</option>
            </select>
         </div>
      </div>
      
      <div class="ms-auto">
        <button class="btn btn-sm btn-outline-danger" onclick="loadLeaveSummaryData()" title="Tải lại dữ liệu">
          <i class="bi bi-arrow-clockwise"></i> Tải lại
        </button>
      </div>
    </div>
  </div>

  <div class="card-body p-0">
    <div class="table-responsive" style="max-height: 70vh; overflow-y: auto;">
      <table class="table table-bordered table-hover mb-0" id="leaveSummaryTable">
        <thead>
          <tr>
            <th class="text-center align-middle" style="width: 50px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">STT</th>
            
            <th class="text-center align-middle" style="min-width: 200px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">Họ và tên</th>
            
            <th class="text-center align-middle" style="min-width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T7</th>
            <th class="text-center align-middle" style="min-width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T8</th>
            <th class="text-center align-middle" style="min-width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T9</th>
            <th class="text-center align-middle" style="min-width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T10</th>
            <th class="text-center align-middle" style="min-width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T11</th>
            <th class="text-center align-middle" style="min-width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T12</th>
            <th class="text-center align-middle" style="min-width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T1</th>
            <th class="text-center align-middle" style="min-width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T2</th>
            <th class="text-center align-middle" style="min-width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T3</th>
            <th class="text-center align-middle" style="min-width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T4</th>
            <th class="text-center align-middle" style="min-width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T5</th>
            <th class="text-center align-middle" style="min-width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T6</th>
          </tr>
        </thead>
        <tbody>
           <tr>
              <td colspan="14" class="text-center text-muted py-4">
                <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
                Đang tải dữ liệu...
              </td>
           </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
