<div class="card shadow-sm p-0 border-0">
  <div class="card-header bg-white border-bottom-0 pt-2 pb-1">
    <div class="d-flex align-items-center">
      <h6 class="text-primary fw-bold mb-0 me-4 text-uppercase"><i class="bi bi-table"></i> TỔNG HỢP KẾT QUẢ</h6>
      <div class="d-flex align-items-center">
         <span class="fw-bold me-2 text-dark" style="font-size: 18px;">Năm học:</span>
         <div style="width: 180px;"><select class="form-select form-select-sm shadow-none border-primary" id="locNamThop" onchange="veBangThop()"><option value="">--Chọn năm--</option></select></div>
      </div>
      <div class="ms-auto"><button class="btn btn-sm btn-outline-primary" onclick="taiDlThop(true)" title="Tải lại dữ liệu"><i class="bi bi-arrow-clockwise"></i> Tải lại</button></div>
    </div>
  </div>

  <div id="aiToastMessage" style="display: none; position: fixed; top: 20px; right: 20px; z-index: 9999; padding: 15px 25px; border-radius: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); color: white; font-family: 'Times New Roman', serif; font-size: 16px; transition: opacity 0.3s ease-in-out; opacity: 0;"></div>
  
  <div class="bg-light p-2 mb-1 mx-2 rounded border" style="display: flex; gap: 10px; align-items: center;">
    <span class="fw-bold text-success" style="white-space: nowrap;">🤖 Lệnh AI:</span>
    <input type="text" id="aiCommand" class="form-control form-control-sm" placeholder="VD: 'Chia cho 9 tháng'. Để trống tự động chia theo số tháng có điểm." style="max-width: 450px; font-family: 'Times New Roman', serif; font-size: 15px;">
    <button class="btn btn-sm btn-success fw-bold" onclick="runAIAssistant()" style="white-space: nowrap;">⚡ Tính toán xếp loại cả năm</button>
    <button id="btnGhiKq" class="btn btn-sm btn-primary fw-bold" onclick="ghiKetQuaAI()" style="white-space: nowrap;">💾 Ghi kết quả</button>
  </div>
  
  <div class="card-body p-0">
    <div class="table-responsive" style="max-height: 70vh; overflow-y: auto;">
      <table class="table table-bordered table-hover mb-0 align-middle" id="bangThop">
        <thead>
          <tr>
            <th class="text-center align-middle" style="width: 50px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">STT</th>
            <th class="text-center align-middle" style="min-width: 170px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">Họ và tên</th> 
            <!-- Đã điều chỉnh min-width từ 145px xuống 115px (~ giảm 20%) -->
            <th class="text-center align-middle" style="min-width: 115px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">Kết quả xếp loại</th>
            <th class="text-center align-middle" style="width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T7</th>
            <th class="text-center align-middle" style="width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T8</th>
            <th class="text-center align-middle" style="width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T9</th>
            <th class="text-center align-middle" style="width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T10</th>
            <th class="text-center align-middle" style="width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T11</th>
            <th class="text-center align-middle" style="width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T12</th>
            <th class="text-center align-middle" style="width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T1</th>
            <th class="text-center align-middle" style="width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T2</th>
            <th class="text-center align-middle" style="width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T3</th>
            <th class="text-center align-middle" style="width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T4</th>
            <th class="text-center align-middle" style="width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T5</th>
            <th class="text-center align-middle" style="width: 100px; position: sticky; top: 0; z-index: 10; background-color: #0d6efd !important; color: white !important;">T6</th>
          </tr>
        </thead>
        <tbody><tr><td colspan="15" class="text-center text-muted py-4"><div class="spinner-border spinner-border-sm text-secondary" role="status"></div> Đang tải dữ liệu...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
/* ==========================================================================
   HÀM ĐIỀU KHIỂN GIAO DIỆN THÔNG BÁO NỔI (TOAST)
   ========================================================================== */
function showAIToast(message, type) {
    let toast = document.getElementById("aiToastMessage");
    toast.innerHTML = message;
    
    if (type === "success") {
        toast.style.background = "linear-gradient(to right, #15803d, #16a34a)";
        toast.style.borderLeft = "5px solid #052e16";
    } else if (type === "warning") {
        toast.style.background = "linear-gradient(to right, #b45309, #d97706)";
        toast.style.borderLeft = "5px solid #78350f";
    } else {
        toast.style.background = "linear-gradient(to right, #b91c1c, #dc2626)";
        toast.style.borderLeft = "5px solid #450a0a";
    }
    
    toast.style.display = "block";
    setTimeout(() => { toast.style.opacity = "1"; }, 10);
    
    setTimeout(() => {
        toast.style.opacity = "0";
        setTimeout(() => { toast.style.display = "none"; }, 300);
    }, 4000);
}

/* ==========================================================================
   HÀM TRỢ LÝ AI: ĐỌC DỮ LIỆU, TÍNH TOÁN VÀ ĐIỀN KẾT QUẢ XẾP LOẠI
   ========================================================================== */
function runAIAssistant() {
    let btn = document.querySelector("button[onclick='runAIAssistant()']");
    let originalText = "";
    if (btn) {
        originalText = btn.innerHTML;
        btn.innerHTML = "⏳ Đang tính toán...";
        btn.disabled = true; 
        btn.style.opacity = "0.7";
    }

    setTimeout(() => {
        try {
            let cmd = document.getElementById("aiCommand").value.toLowerCase();
            let customDivisor = null;
            let matchDiv = cmd.match(/chia\s*(?:cho\s*)?(\d+)/);
            if (matchDiv && matchDiv[1]) {
                customDivisor = parseInt(matchDiv[1]);
            }

            let table = document.getElementById("bangThop");
            if (!table) throw new Error("Không tìm thấy bảng dữ liệu 'bangThop'.");
            
            let tbody = table.getElementsByTagName("tbody")[0];
            if (!tbody) throw new Error("Bảng chưa có nội dung body.");
            
            let rows = tbody.getElementsByTagName("tr");
            let updatedCount = 0;

            for (let i = 0; i < rows.length; i++) {
                let row = rows[i];
                let tds = row.getElementsByTagName("td");
                
                if (tds.length < 15) continue; 

                let countHTXS = 0, countHTT = 0, countHT = 0, countCHT = 0;
                let totalScore = 0;
                let validMonths = 0;

                for (let j = 3; j <= 14; j++) {
                    if (!tds[j]) continue; 
                    
                    let cellText = tds[j].innerText.trim();
                    if (cellText === "" || cellText === "-" || cellText.includes("...")) continue;

                    let diem = 0;
                    let matchDiem = cellText.match(/(\d+)/);
                    if (matchDiem) diem = parseFloat(matchDiem[1]);

                    let textLower = cellText.toLowerCase();
                    if (textLower.includes("xuất sắc")) {
                        totalScore += (90 + diem);
                        countHTXS++;
                        validMonths++;
                    } else if (textLower.includes("chưa hoàn thành")) {
                        totalScore += diem;
                        countCHT++;
                        validMonths++;
                    } else if (textLower.includes("tốt")) {
                        totalScore += (85 + diem);
                        countHTT++;
                        validMonths++;
                    } else if (textLower.includes("hoàn thành")) {
                        totalScore += (75 + diem);
                        countHT++;
                        validMonths++;
                    }
                }

                if (validMonths === 0) continue;

                let D = customDivisor ? customDivisor : validMonths;
                let avgScore = (totalScore / D).toFixed(1);

                let xepLoai = "Chưa hoàn thành";
                if (countCHT > 0) {
                    xepLoai = "Chưa hoàn thành";
                } else if ((countHTXS / validMonths) >= 0.3 && (countHTXS + countHTT === validMonths)) {
                    xepLoai = "Hoàn thành xuất sắc";
                } else if (((countHTXS + countHTT) / validMonths) >= 0.7 && (countHTXS + countHTT + countHT === validMonths)) {
                    xepLoai = "Hoàn thành tốt";
                } else if ((countHTXS + countHTT + countHT) === validMonths) {
                    xepLoai = "Hoàn thành";
                }

                if (tds[2]) {
                    tds[2].innerHTML = `<div style="text-align: center; line-height: 1.5;">
                                          <span style="color: #b91c1c; font-weight: bold;">${xepLoai}</span><br>
                                          <span style="font-weight: bold; color: #1e3a8a;">${avgScore} điểm</span>
                                        </div>`;
                    tds[2].style.verticalAlign = "middle"; 
                    updatedCount++;
                }
            }

            if (updatedCount > 0) {
                showAIToast("✅ <b>Hoàn tất tính toán!</b><br>Đã điền kết quả tự động cho " + updatedCount + " cán bộ.", "success");
            } else {
                showAIToast("⚠️ <b>Không có dữ liệu!</b><br>Các dòng dữ liệu đang trống, không thể tính toán.", "warning");
            }

        } catch (error) {
            showAIToast("❌ <b>Hệ thống gặp sự cố:</b><br>" + error.message, "error");
        } finally {
            if (btn) {
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }
    }, 150); 
}

/* ==========================================================================
   HÀM BỔ SUNG: GHI KẾT QUẢ ĐÃ TÍNH TOÁN LÊN MÁY CHỦ
   ========================================================================== */
function ghiKetQuaAI() {
    let table = document.getElementById("bangThop");
    if (!table) return;
    
    let tbody = table.getElementsByTagName("tbody")[0];
    let rows = tbody.getElementsByTagName("tr");
    let duLieuGhi = [];

    for (let i = 0; i < rows.length; i++) {
        let tds = rows[i].getElementsByTagName("td");
        if (tds.length < 15) continue; 
        
        let hoTen = tds[1].innerText.trim();
        let htmlKq = tds[2];
        let xepLoai = "";
        
        // Trích xuất văn bản kết quả bỏ qua định dạng HTML màu sắc
        if (htmlKq.innerText.trim() !== "") {
            let theSpan = htmlKq.getElementsByTagName("span");
            if (theSpan.length > 1) {
                // Lấy cả 2 thẻ span (Chữ xếp loại và Điểm số), nối bằng dấu xuống dòng (\n)
                xepLoai = theSpan[0].innerText.trim() + "\n" + theSpan[1].innerText.trim();
            } else if (theSpan.length > 0) {
                xepLoai = theSpan[0].innerText.trim();
            } else {
                xepLoai = htmlKq.innerText.trim();
            }
        }
        
        // Chỉ ghi các hồ sơ đã có kết quả
        if (hoTen && xepLoai && xepLoai !== "-" && xepLoai !== "Chưa có" && xepLoai !== "") {
            duLieuGhi.push({ tenn: hoTen, kq: xepLoai });
        }
    }

    if (duLieuGhi.length === 0) {
        showAIToast("⚠️ <b>Chưa có dữ liệu để ghi!</b><br>Vui lòng chạy 'Tính toán xếp loại' trước khi ghi.", "warning");
        return;
    }

    let btn = document.getElementById("btnGhiKq");
    let originalText = btn.innerHTML;
    btn.innerHTML = "⏳ Đang ghi...";
    btn.disabled = true;

    // Chú ý: Dùng window.khachApi để không bị lỗi không tìm thấy định danh
    window.khachApi.ghiKetQuaThop(duLieuGhi, function(kqra) {
        showAIToast("✅ <b>Ghi kết quả thành công!</b><br>" + kqra.tbao, "success");
        btn.innerHTML = originalText;
        btn.disabled = false;
    }, function(loie) {
        showAIToast("❌ <b>Lỗi ghi dữ liệu:</b><br>" + loie.message, "error");
        btn.innerHTML = originalText;
        btn.disabled = false;
    });
}
</script>
